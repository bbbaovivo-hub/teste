<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BBB</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --primary-red: #8b0000;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 35%, rgba(139, 0, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 65%, rgba(139, 0, 0, 0.1) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* CARD DE LOGIN */
        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: cardAppear 0.8s ease-out forwards;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .logo span {
            color: var(--primary-red);
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* BOTÃO DO GOOGLE PERSONALIZADO */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background-color: #ffffff;
            color: #1f1f1f;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .google-btn:hover {
            background-color: #f1f1f1;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* RODAPÉ DO CARD */
        .footer-link {
            margin-top: 30px;
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .footer-link:hover {
            color: var(--text-main);
        }

        /* BOTÃO VOLTAR */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--text-main);
            transform: translateX(-5px);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 480px) {
            .login-card {
                max-width: 90%;
                padding: 40px 25px;
                border: none;
                background: transparent;
                box-shadow: none;
            }
            body {
                background-image: none;
            }
        }
        
        
        
                    /* >>>>> NOVO CÓDIGO CSS DO MODAL COMEÇA AQUI <<<<< */

            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.7); /* Fundo escuro semitransparente */
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2000; /* Acima de tudo, inclusive do menu lateral */
                opacity: 0; /* Escondido por padrão */
                visibility: hidden; /* Escondido por padrão */
                transition: opacity 0.3s ease, visibility 0.3s ease;
            }

            .modal-overlay.active {
                opacity: 1;
                visibility: visible;
            }

    .modal-content {
        background-color: var(--bg-color);
        border-radius: 12px;
        padding: 30px;
        max-width: 450px;
        width: 90%;
        text-align: center;
        position: relative;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        
        /* LINHAS DE ANIMAÇÃO ATUALIZADAS AQUI */
        transform: scale(0.95); /* Começa um pouco menor */
        opacity: 0; /* Começa invisível */
        /* Transição de entrada mais rápida e dinâmica */
        transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.1s ease-out; 
    }

            .modal-overlay.active .modal-content {
        transform: scale(1); /* Volta ao tamanho normal */
        opacity: 1; /* Fica visível */
    }

            .modal-close-btn {
                position: absolute;
                top: 15px;
                right: 20px;
                background: none;
                border: none;
                color: var(--text-secondary);
                font-size: 2rem;
                cursor: pointer;
                transition: color 0.2s ease;
            }

            .modal-close-btn:hover {
                color: var(--text-main);
            }

            #modalTitle {
                font-size: 1.8rem;
                font-weight: 700;
                margin-bottom: 15px;
                color: var(--text-main);
            }

            #modalMessage {
                font-size: 0.95rem;
                line-height: 1.5;
                color: var(--text-secondary);
                margin-bottom: 30px;
            }

            .modal-action-btn {
                background-color: #e50914; /* Vermelho vibrante similar ao da Globoplay */
                color: #ffffff;
                border: none;
                padding: 14px 35px;
                border-radius: 8px;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
                width: 100%; /* Botão em largura total */
                max-width: 300px; /* Limite para não ficar muito largo em desktop */
            }

            .modal-action-btn:hover {
                background-color: #ff0015; /* Um vermelho um pouco mais claro no hover */
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
            }

        /* Animação para quando o modal está saindo */
        @keyframes modalFadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

    .modal-overlay.hiding .modal-content {
        /* Animação de saída mais rápida */
        animation: modalFadeOut 0.1s ease-in forwards; 
    }

const firebaseConfig = {

        // >>>>> FUNÇÕES OPENMODAL E CLOSEMODAL COPIADAS DO INDEX.HTML (COLE AQUI) <<<<<

// Função para abrir o modal com conteúdo personalizado (sem o 'type' de FAQ)
function openModal(title = '', message = '', actionText = null, continueCallback = null) { // Mudamos actionUrl para continueCallback
    // No login.html, sempre mostraremos o conteúdo genérico
    document.getElementById('genericModalContent').style.display = 'block';
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalMessage').innerText = message;

    const modalActionButton = document.getElementById('modalActionButton');

    // Configura e exibe o botão genérico
    if (actionText) {
        modalActionButton.innerText = actionText;
        modalActionButton.style.display = 'block';
        modalActionButton.onclick = () => { // Configura a ação do botão
            closeModal(); // Fecha o modal primeiro
            if (continueCallback && typeof continueCallback === 'function') { // Se houver um callback, executa
                continueCallback();
            }
        };
    } else {
        modalActionButton.style.display = 'none'; // Esconde o botão se não houver texto de ação
        modalActionButton.onclick = null; // Remove qualquer ação anterior
    }

    document.getElementById('modal').classList.add('active'); // Mostra o modal-overlay
    document.body.style.overflow = 'hidden'; // Impede o scroll da página
}

// Sua função closeModal permanece a mesma
function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.add('hiding');
    setTimeout(() => {
        modal.classList.remove('active');
        modal.classList.remove('hiding');
        document.body.style.overflow = '';
    }, 200);
}

// >>>>> FIM DAS FUNÇÕES OPENMODAL E CLOSEMODAL <<<<<








        // --- NOVO BLOCO PARA TRATAR REDIRECIONAMENTO DE LOGIN ---
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                // Usuário logado via redirecionamento!
                const user = result.user;
                console.log('Login com Google bem-sucedido via redirecionamento!', user);

                // Armazenar informações do usuário REAL no localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user.displayName);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userPhotoURL', user.photoURL);

                // <<<<<< IMPORTANTE: NÃO REDIRECIONAR AQUI! >>>>>>
                // Em vez disso, abra o modal e passe o redirecionamento como callback
                openModal(
                    'Login feito!',
                    `Bem-vindo(a), ${user.displayName}! Clique em "Continuar" para acessar o chat.`,
                    'Continuar', // Texto do botão
                    () => { // Callback que será executado ao clicar em "Continuar"
                        window.location.href = 'index.html'; // Redireciona para a página principal
                        // OU 'app.html' se quiser ir direto para o app
                    }
                );
            }
        }).catch((error) => {
            // Lidar com erros de login via redirecionamento
            console.error("Erro no login com Google via redirecionamento:", error);
            let errorMessage = "Ocorreu um erro no login. Tente novamente.";
            if (error.code === 'auth/account-exists-with-different-credential') {
                errorMessage = "Você já possui uma conta com este e-mail usando outro método de login.";
            }

            openModal(
                'Erro no Login',
                errorMessage,
                'Fechar'
            );
            // Reverter o botão para o estado original se necessário (pode não ser visível se o erro for rápido)
            const btn = document.getElementById('loginBtn');
            if (btn) {
                btn.style.opacity = '1';
                btn.innerHTML = `
                    <svg class="google-icon" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>

                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    </svg> Entrar com Google`;
            }
        });
        // --- FIM DO NOVO BLOCO ---
    
    
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loginBtn');

            btn.style.opacity = '0.7';
            btn.innerText = 'Conectando...';

            try {
                // Crie um provedor de autenticação Google
                const provider = new firebase.auth.GoogleAuthProvider();

                // Opcional: Adicione escopos para obter mais informações do perfil (ex: email)
                provider.addScope('email');

                // Abre o popup do Google para login
                const result = await auth.signInWithPopup(provider);

                // Login bem-sucedido!
                const user = result.user; // Objeto com informações do usuário logado

                // Armazenar informações do usuário REAL no localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user.displayName);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userPhotoURL', user.photoURL); // Foto do perfil do Google

                // <<<<<< IMPORTANTE: NÃO REDIRECIONAR AQUI! >>>>>>
                // Em vez disso, abra o modal e passe o redirecionamento como callback
                openModal(
                    'Login feito!',
                    `Bem-vindo(a), ${user.displayName}! Clique em "Continuar" para acessar o chat.`,
                    'Continuar', // Texto do botão
                    () => { // Callback que será executado ao clicar em "Continuar"
                        window.location.href = 'index.html'; // Redireciona para a página principal
                        // OU 'app.html' se quiser ir direto para o app
                    }
                );

                // Remove o redirecionamento imediato e o setTimeout daqui!
                // O redirecionamento agora é feito no callback do botão "Continuar" do modal.

            } catch (error) {
                // Ocorreu um erro durante o login
                console.error("Erro no login com Google:", error);
                let errorMessage = "Ocorreu um erro no login. Tente novamente.";

                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage = "Login cancelado. Por favor, tente novamente.";
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = "Erro de conexão. Verifique sua internet.";
                } else if (error.code === 'auth/cancelled-popup-request') {
                    // Isso pode acontecer se o usuário clicar no botão de login várias vezes rapidamente.
                    // Não é um erro crítico, apenas impede múltiplos popups.
                    console.log("Requisição de popup de login cancelada.");
                    errorMessage = "A janela de login foi cancelada. Tente novamente.";
                }

                // Em caso de erro, mostre o modal de erro
                openModal(
                    'Erro no Login',
                    errorMessage,
                    'Fechar' // Botão "Fechar" apenas fecha o modal, não redireciona
                );

                // Reverter o botão para o estado original
                btn.style.opacity = '1';
                btn.innerHTML = `

                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>

                    </svg> Entrar com Google`;
            }
        });    

        </script>
