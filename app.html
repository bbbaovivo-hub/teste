<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBB Ao Vivo - Premium</title>

<style>
/* Reset básico e box-sizing */
* { box-sizing: border-box; }

:root {
    --bg: #09090b;
    --panel: #121214;
    --border: #27272a;
    --primary: #8b5cf6; /* Um roxo mais vibrante */
    --primary-hover: red;
    --text: #f4f4f5;
    --muted: #71717a;
    --chat-bg: #0c0c0e;
}

/* 
 * CRUCIAL: 'html' e 'body' devem ter 100% da altura da viewport.
 * O 'body' será o contêiner flex principal para o layout geral.
 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%; /* Garante que body e html ocupam a altura total da viewport */
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    /* 'display: flex' e 'flex-direction: column' serão aplicados diretamente no body */
}

body {
    display: flex;
    flex-direction: column; /* Organiza os filhos (apenas .main) verticalmente */
    overflow: hidden; /* Evita rolagem da página principal, deixando-a para os filhos */
}

.main {
    flex: 1; /* CRUCIAL: Ocupa todo o espaço vertical restante no 'body' */
    display: flex;
    /* A 'flex-direction' será definida pelas media queries: row para desktop, column para mobile */
    overflow: hidden; /* Importante para evitar barras de rolagem duplas no container principal */
    min-height: 0; /* Essencial para flex-items que podem encolher */
}

/* --- PLAYER AREA --- */
.player-area {
    display: flex;
    flex-direction: column; /* Player e canais empilhados verticalmente */
    flex-shrink: 0; /* NO MOBILE: Impede que esta área encolha. Sua altura é definida pelo player + canais. */
    /* NO DESKTOP: Sua largura será flexível com flex: 1 */
}

.player {
    width: 100%;
    aspect-ratio: 16 / 9; /* Mantém a proporção do vídeo */
    background: black;
    position: relative;
    flex-shrink: 0; /* Impede que o player encolha */
}

.player iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.player-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9rem;
    font-weight: 300;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.player-overlay.visible {
    opacity: 1;
    pointer-events: all;
}

.player-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.channels {
    height: 55px; /* Altura fixa para a barra de canais */
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 15px;
    overflow-x: auto; /* Rolagem horizontal para os canais */
    flex-shrink: 0; /* Impede que os canais encolham */
    -webkit-overflow-scrolling: touch; /* Melhora a rolagem em iOS */
}

.channel {
    min-width: 110px;
    height: 42px;
    background: #27272a;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: .25s;
    font-size: .8rem;
    font-weight: 600;
}

.channel:hover {
    transform: translateY(-3px);
    background: #3f3f46;
}

.channel.active {
    border-color: #950101; /* Cor de destaque para o canal ativo */
    background: #950101;
}

/* --- CHAT GLOBAL --- */
aside.chat { /* Usar 'aside.chat' para ser mais específico e evitar conflitos */
    background: var(--chat-bg);
    display: flex;
    flex-direction: column; /* Cabeçalho, mensagens e footer empilhados */
    flex: 1; /* CRUCIAL para o mobile: Chat ocupa o restante do espaço vertical no '.main' */
    min-height: 0; /* Permite que o chat encolha se houver pouco espaço */
}

.chat-header {
    padding: 7px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0; /* Impede que o cabeçalho encolha */
}

.chat-header h2 {
    margin: 0;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #fff;
}

.online {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
}



/* Mensagens */
.chat-messages {
    flex: 1; /* CRUCIAL: Ocupa todo o espaço vertical disponível dentro do chat */
    padding: 15px;
    overflow-y: auto; /* CRUCIAL: Adiciona barra de rolagem VERTICAL se o conteúdo exceder a altura */
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-x: hidden; /* Impede rolagem horizontal indesejada */
    min-height: 0; /* Essencial para que este flex-item possa encolher */
}

/* Estilo do Scrollbar */
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

.msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Estilo para o avatar (foto de perfil) */
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: var(--muted); /* Fundo padrão para avatar sem imagem */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1rem;
    font-weight: bold;
    color: white;
    flex-shrink: 0; /* Evita que o avatar encolha */
    margin-right: 0px; /* Espaço entre o avatar e a mensagem */
    margin-top: 5px; /* NOVO: Empurra o avatar para baixo para alinhar com a bolha */
}

.msg-content {
    flex: 1;
}

.msg-info {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
}

.username {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e4e4e7;
}

.time {
    font-size: 0.65rem;
    color: var(--muted);
}

.text {
    font-size: 0.88rem;
    line-height: 1.4;
    color: #a1a1aa;
    word-break: break-word;
}

/* Input de Chat */
.chat-footer {
    padding: 10px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0; /* Impede que o footer encolha */
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: #09090b;
    border: 1px solid var(--border);
    border-radius: 90px;
    padding: 4px 8px;
    transition: border-color 0.2s;
}

.chat-footer input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 10px;
    font-size: 0.9rem;
    outline: none;
}

.chat-footer button {
    background: red;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 100px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.chat-footer button:hover { background: var(--primary-hover); }


/* Estilo para a mensagem de login no chat */
.login-prompt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white; /* NOVO: Fundo branco */
    border: 1px solid white; /* NOVO: Borda branca para combinar */
    border-radius: 90px; /* Borda arredondada */
    padding: 10px 15px;
    font-size: 0.9rem;
    color: black; /* NOVO: Texto preto */
    cursor: pointer; /* Indica que é clicável */
    text-align: center;
    transition: background 0.2s, border-color 0.2s, color 0.2s; /* NOVO: Adicionei 'color' na transição */
}

.login-prompt:hover {
    background: #e0e0e0; /* NOVO: Um cinza bem clarinho no hover */
    border-color: #e0e0e0; /* NOVO: Borda clara no hover */
    color: black; /* NOVO: Mantém o texto preto */
}

.login-prompt:active { /* NOVO: Estilo para quando o botão é clicado (ativo) */
    background: red; /* NOVO: Fundo vermelho quando clicado */
    border-color: red; /* NOVO: Borda vermelha */
    color: white; /* NOVO: Texto branco para contrastar com o fundo vermelho */
    transform: scale(0.98); /* NOVO: Uma pequena animação de "apertar" o botão */
}

/* --- MOBILE (TELAS MENORES OU IGUAIS A 900px) --- */
@media (max-width: 900px) {
    .main {
        flex-direction: column; /* Player e chat empilhados verticalmente */
    }

    .player-area {
        width: 100%; /* Player ocupa a largura total */
        /* flex-shrink: 0; já está definido globalmente no .player-area */
    }

    aside.chat {
        width: 100%; /* Chat ocupa a largura total */
        border-left: none; /* Remove a borda lateral */
        /* flex: 1; e min-height: 0; já definidos globalmente no aside.chat */
    }
}

/* Estilo para a bolha da mensagem */
.message-bubble {
  width: 100%;
    max-width: 100%;
    background: #181819; /* Fundo escuro para a bolha */
    border-radius: 15px; /* Bordas arredondadas para o formato de bolha */
    padding: 8px 12px; /* Espaçamento interno */
    /* REMOVIDO: max-width: 85%; */
    word-wrap: break-word; /* Garante que palavras longas quebrem para caber na bolha */
    margin-top: 5px; /* Pequeno espaçamento entre o avatar e a bolha */
    position: relative; /* Para a "setinha" da bolha, se quiser adicionar depois */
}

/* Ajustes no layout da mensagem para acomodar a bolha */
.msg-content {
    display: flex;
    flex-direction: column; /* Coloca os elementos do conteúdo da msg em coluna */
    align-items: flex-start; /* Alinha a bolha à esquerda, para as mensagens dos outros usuários */
    flex: 1; /* Permite que o msg-content ocupe o espaço restante */
}

/* Ajustes para o texto da mensagem dentro da bolha */
.text {
    margin-top: 5px; /* Pequeno espaçamento entre o nome e o texto da mensagem */
    color: white; /* Garante que o texto tenha uma boa cor dentro da bolha escura */
}

/* Ajustes para o nome de usuário dentro da bolha */
.username {
    color: #aaa; /* Cor roxa para o nome de usuário */
    font-weight: 600;
}

/* Ajustes para a hora da mensagem dentro da bolha */
.time {
    color: #a1a1aa; /* Cor mais suave para a hora */
}

/* --- DESKTOP (TELAS MAIORES QUE 900px) --- */
@media (min-width: 901px) {
    body {
        padding-top: 20px; /* Adiciona espaçamento na parte superior do body APENAS no desktop */
    }

    .main {
        flex-direction: row; /* Player e chat lado a lado */
        gap: 15px; /* Espaçamento entre player e chat */
        padding-right: 15px; /* Adiciona padding à direita do .main para alinhar com o padding do body */
    }

    .player-area {
        flex: 1; /* Player-area ocupa o espaço flexível */
        min-width: 0; /* Essencial para que o player-area possa encolher */
        height: 100%; /* Player-area ocupa 100% da altura do .main */
    }

    aside.chat {
        width: 430px; /* Largura FIXA para o chat no desktop */
        flex: none; /* Desativa o comportamento flex de largura do chat */
        border: 1px solid var(--border); /* Borda em todos os lados do chat */
        height: 100%; /* CRUCIAL: Chat ocupa 100% da altura do .main */
        border-radius: 10px; /* Bordas arredondadas */
        overflow: hidden; /* Garante que o conteúdo respeite as bordas arredondadas */
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3); /* Sombra para profundidade */
    }
}


/* Estilo para a mensagem de carregamento no chat */
.chat-loading-message {
    text-align: center;
    color: var(--muted); /* Cor de texto mais suave */
    font-size: 0.85rem;
    padding: 20px 0;
    width: 100%; /* Ocupa toda a largura do chat */
    display: none; /* COMEÇA ESCONDIDA AGORA, SÓ APARECE SE PRECISO VIA JS*/
    justify-content: center; /* Para display flex */
    align-items: center; /* Para display flex */
}


/* --- ESTRUTURA ESPECÍFICA PARA DESKTOP (TELAS MAIORES QUE 900px) --- */
@media (min-width: 901px) {
    body {
        padding-top: 20px; /* Adiciona espaçamento na parte superior do body APENAS no desktop */
    }

    .main {
        flex-direction: row; /* Garante que player e chat fiquem lado a lado */
        gap: 15px; /* Adiciona um espaçamento de 15px entre o player e o chat */
        padding-right: 15px; /* Adiciona padding à direita do .main para alinhar com o padding do body */
    }

    .player-area {
        flex: 1; /* O player vai ocupar TODO o espaço restante da tela */
        min-width: 0; /* Essencial para que o player-area possa encolher se a janela for redimensionada */
    }

    .chat {
        width: 430px; /* <<< Largura FIXA para o chat no desktop */
        flex: none; /* Desativa o comportamento flex do chat para respeitar o 'width' fixo */
        
        border: 1px solid var(--border); /* <<< AGORA SIM: Borda de 1px em TODOS os lados do chat */
        
        height: auto; /* Permite que a altura do chat se ajuste ao conteúdo, ocupando 100% da altura do .main */
        border-radius: 10px; /* Bordas arredondadas para TODOS os cantos */
        overflow: hidden; /* Garante que o conteúdo dentro do chat respeite as bordas arredondadas */
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3); /* Sombra para dar profundidade e separação */
    }
}
/* --- FIM DA ESTRUTURA ESPECÍFICA PARA DESKTOP --- */

        <script>
          // CONFIG FIREBASE (MESMO DO LOGIN)
const firebaseConfig = {
  apiKey: "AIzaSyBfwC-5l8fPCvcgrwao9pG7gj9TmOuvLcU",
  authDomain: "bbb-ao-vivo2.firebaseapp.com",
  databaseURL: "https://bbb-ao-vivo2-default-rtdb.firebaseio.com",
  projectId: "bbb-ao-vivo2",
  storageBucket: "bbb-ao-vivo2.firebasestorage.app",
  messagingSenderId: "172632221080",
  appId: "1:172632221080:web:7e3659ee27e0cea434f7ed"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const database = firebase.database();
          
          
          // REFERÊNCIA DE ONLINE
const onlineRef = database.ref("onlineUsers");
const connectedRef = database.ref(".info/connected");

connectedRef.on("value", (snap) => {
    if (snap.val() === true) {
        const userId = Date.now() + "_" + Math.random().toString(36).substr(2, 9);
        const userRef = onlineRef.child(userId);

        userRef.set(true);

        userRef.onDisconnect().remove();
    }
});
          
          // CONTADOR DE ONLINE
onlineRef.on("value", (snapshot) => {
    const count = snapshot.numChildren();
    document.getElementById("onlineCount").textContent = count;
});
          
          
          
          
        const iframe = document.getElementById("player");
        const channels = document.querySelectorAll(".channel");
        const chatContainer = document.getElementById("chat");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");
        
           const chatLoading = document.getElementById("chatLoading"); // NOVO: Referência para a mensagem de carregamento
        
        
        
        
                // NOVOS ELEMENTOS: Referências para controlar a área de input/mensagem de login
        const chatInputArea = document.getElementById("chatInputArea");
        const loginPrompt = document.getElementById("loginPrompt");
        

        const playerOverlay = document.getElementById("playerOverlay");
        const overlayMessage = document.getElementById("overlayMessage");

        // Variável para armazenar o ID do setTimeout para o overlay, para poder cancelar se necessário
        let overlayHideTimeout;

        // --- Lógica Inicial do Player ---
        // 1. Garante que o iframe começa vazio
        iframe.src = "";
        // 2. Exibe a mensagem inicial com fade-in
        playerOverlay.style.display = 'flex'; // Torna o elemento visível para iniciar o fade-in
        setTimeout(() => { // Pequeno delay para garantir que o 'display' foi aplicado antes do 'opacity'
            playerOverlay.classList.add('visible');
            overlayMessage.innerText = "Escolha uma câmera";
        }, 10); // Pequeno delay
        // --- Fim Lógica Inicial ---

        // Trocar Canais
        channels.forEach(c => {
            c.addEventListener("click", () => {
                // Limpa qualquer timeout anterior para evitar comportamento inesperado se o usuário clicar rápido
                clearTimeout(overlayHideTimeout);

                channels.forEach(el => el.classList.remove("active"));
                c.classList.add("active");

                // --- NOVO: Lógica para mostrar overlay com fade-in ---
                playerOverlay.style.display = 'flex'; // Garante que o overlay é um flexbox
                setTimeout(() => { // Pequeno delay para garantir que o 'display' foi aplicado antes do 'opacity'
                    playerOverlay.classList.remove('hidden'); // Remove a classe hidden se estiver lá
                    playerOverlay.classList.add('visible'); // Adiciona a classe visible para o fade-in
                    overlayMessage.innerText = "Carregando câmera...";
                }, 10); // Pequeno delay
                // --- Fim Lógica mostrar overlay ---

                // Define a URL do iframe
                iframe.src = c.dataset.url;

                // Esconder overlay após 2.5 segundos (2500ms)
                overlayHideTimeout = setTimeout(() => { // Armazena o ID do timeout
                    playerOverlay.classList.remove('visible'); // Inicia o fade-out
                    playerOverlay.classList.add('hidden'); // Adiciona a classe hidden
                    
                    // NOVO: Adiciona um setTimeout EXTRA para mudar o display para 'none' APÓS o fade-out
                    setTimeout(() => {
                        playerOverlay.style.display = 'none'; // Agora sim, remove do layout
                    }, 400); // Deve ser igual à duração da transição de opacidade do CSS (0.4s = 400ms)

                }, 2500); // O tempo que o overlay fica visível (2.5 segundos)
            });
        });

// ENVIAR MENSAGEM PARA O FIREBASE
function sendMessage() {
    const text = msgInput.value.trim();
    if (text === "") return;

    // NOVO: Pega o usuário logado diretamente do Firebase Auth
    const user = auth.currentUser; // ESTA É A LINHA PRINCIPAL A SER ADICIONADA

    if (!user) { // NOVO: Verifica se há um usuário logado usando o objeto 'user' do Firebase
        alert("Você precisa estar logado para enviar mensagens.");
        return;
    }

    // MANTENHA SUAS LINHAS EXISTENTES PARA PEGAR userName E userPhoto,
    // OU use user.displayName e user.photoURL se preferir.
    // Exemplo para manter sua lógica original (usando localStorage, se você usa):
    const userName = localStorage.getItem('userName') || user.displayName || "Anônimo";
    const userPhoto = localStorage.getItem('userPhotoURL') || user.photoURL || null;

    // Ou, se você quer usar SOMENTE o Firebase para o nome e foto (recomendado):
    // const userName = user.displayName || "Anônimo";
    // const userPhoto = user.photoURL || null;

    const messageData = {
        name: userName,
        photo: userPhoto,
        text: text,
        timestamp: Date.now()
    };

    database.ref("chatMessages").push(messageData);

    msgInput.value = "";
}

// Botões
sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

        <div class="msg">
            <div class="avatar">
                ${data.photo ? `<img src="${data.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : avatarLetter}
            </div>
            <div class="msg-content">
                <div class="message-bubble"> <!-- NOVO: Esta é a bolha da mensagem -->
                    <div class="msg-info">
                        <span class="username">${data.name}</span>
                        <span class="time">${time}</span>
                    </div>
                    <div class="text">${data.text}</div>
                </div> <!-- Fim da bolha -->
            </div>
        </div>
    `;

    chatContainer.insertAdjacentHTML('beforeend', msgHtml);
    chatContainer.scrollTop = chatContainer.scrollHeight;
});


// --- NOVO CÓDIGO PARA LÓGICA DE LOGIN NO CHAT (APARECER/DESAPARECER O BOTÃO) ---

// Função para alternar a visibilidade do input de chat ou da mensagem de login
function updateChatInputState(user) {
    if (user) {
        // Usuário logado: mostra o input de chat normal e esconde a mensagem de login.
        chatInputArea.style.display = 'flex'; // Exibe o campo de input
        loginPrompt.style.display = 'none';   // Esconde a mensagem "Faça login"
    } else {
        // Usuário NÃO logado: esconde o input de chat e mostra a mensagem "Faça login".
        chatInputArea.style.display = 'none'; // Esconde o campo de input
        loginPrompt.style.display = 'flex';   // Exibe a mensagem "Faça login"
    }
}

// Redireciona para a página de login ao clicar na mensagem
loginPrompt.addEventListener("click", () => {
    window.location.href = "login.html"; // Redireciona para a sua página de login
});

// Listener de estado de autenticação do Firebase
// Esta função é CRÍTICA. Ela será chamada toda vez que o estado de login mudar
// (logar, deslogar) e também quando a página carregar (para verificar se já está logado).
// Aguarda Firebase confirmar estado real antes de exibir qualquer coisa
auth.onAuthStateChanged((user) => {
  // NOVO: Exibe a mensagem de carregamento no início
chatLoading.style.display = 'flex'; // Torna a mensagem de carregamento visível

    if (user) {
        // Está realmente logado
        chatInputArea.style.display = "flex";
        loginPrompt.style.display = "none";
    } else {
        // Não está logado
        chatInputArea.style.display = "none";
        loginPrompt.style.display = "flex";
    }

});








// --- FIM DO CÓDIGO DO BOTÃO ---
