<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBB Ao Vivo - Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Reset básico e box-sizing */
* { box-sizing: border-box; }

:root {
    --bg: #09090b;
    --panel: #121214;
    --border: #27272a;
    --primary: #6366f1; /* Um roxo mais vibrante */
    --primary-hover: red;
    --text: #f4f4f5;
    --muted: #71717a;
    --chat-bg: #0c0c0e;
}

/* 
 * CRUCIAL: 'html' e 'body' devem ter 100% da altura da viewport.
 * O 'body' será o contêiner flex principal para o layout geral.
 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%; /* Garante que body e html ocupam a altura total da viewport */
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    /* 'display: flex' e 'flex-direction: column' serão aplicados diretamente no body */
}

body {
    display: flex;
    flex-direction: column; /* Organiza os filhos (apenas .main) verticalmente */
    overflow: hidden; /* Evita rolagem da página principal, deixando-a para os filhos */
}

.main {
    flex: 1; /* CRUCIAL: Ocupa todo o espaço vertical restante no 'body' */
    display: flex;
    /* A 'flex-direction' será definida pelas media queries: row para desktop, column para mobile */
    overflow: hidden; /* Importante para evitar barras de rolagem duplas no container principal */
    min-height: 0; /* Essencial para flex-items que podem encolher */
}

/* --- PLAYER AREA --- */
.player-area {
    display: flex;
    flex-direction: column; /* Player e canais empilhados verticalmente */
    flex-shrink: 0; /* NO MOBILE: Impede que esta área encolha. Sua altura é definida pelo player + canais. */
    /* NO DESKTOP: Sua largura será flexível com flex: 1 */
}

.player {
    width: 100%;
    aspect-ratio: 16 / 9; /* Mantém a proporção do vídeo */
    background: black;
    position: relative;
    flex-shrink: 0; /* Impede que o player encolha */
}

.player iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.player-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9rem;
    font-weight: 300;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.player-overlay.visible {
    opacity: 1;
    pointer-events: all;
}

.player-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.channels {
    height: 55px; /* Altura fixa para a barra de canais */
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 15px;
    overflow-x: auto; /* Rolagem horizontal para os canais */
    flex-shrink: 0; /* Impede que os canais encolham */
    -webkit-overflow-scrolling: touch; /* Melhora a rolagem em iOS */
}

.channel {
    min-width: 110px;
    height: 42px;
    background: #27272a;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: .25s;
    font-size: .8rem;
    font-weight: 600;
}

.channel:hover {
    transform: translateY(-3px);
    background: #3f3f46;
}

.channel.active {
    border-color: #6366f1; /* Cor de destaque para o canal ativo */
    background: #151515;
}

/* --- CHAT GLOBAL --- */
aside.chat { /* Usar 'aside.chat' para ser mais específico e evitar conflitos */
    background: var(--chat-bg);
    display: flex;
    flex-direction: column; /* Cabeçalho, mensagens e footer empilhados */
    flex: 1; /* CRUCIAL para o mobile: Chat ocupa o restante do espaço vertical no '.main' */
    min-height: 0; /* Permite que o chat encolha se houver pouco espaço */
}

.chat-header {
    padding: 7px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0; /* Impede que o cabeçalho encolha */
}

.chat-header h2 {
    margin: 0;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #fff;
}

.online {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
}



/* Mensagens */
.chat-messages {
    flex: 1; /* CRUCIAL: Ocupa todo o espaço vertical disponível dentro do chat */
    padding: 9px;
    overflow-y: auto; /* CRUCIAL: Adiciona barra de rolagem VERTICAL se o conteúdo exceder a altura */
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow-x: hidden; /* Impede rolagem horizontal indesejada */
    min-height: 0; /* Essencial para que este flex-item possa encolher */
}

/* Estilo do Scrollbar */
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

.msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Estilo para o avatar (foto de perfil) */
.avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--muted); /* Fundo padrão para avatar sem imagem */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1rem;
    font-weight: bold;
    color: white;
    flex-shrink: 0; /* Evita que o avatar encolha */
    margin-right: -5px; /* Espaço entre o avatar e a mensagem */
    margin-top: 7px; /* NOVO: Empurra o avatar para baixo para alinhar com a bolha */
}

.msg-content {
    flex: 1;
}

.msg-info {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
}

.username {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e4e4e7;
}

.time {
    font-size: 0.65rem;
    color: var(--muted);
}

.text {
    font-size: 0.88rem;
    line-height: 1.4;
    color: #a1a1aa;
    word-break: break-word;
}

/* Input de Chat */
.chat-footer {
    padding: 5px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0; /* Impede que o footer encolha */
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: #09090b;
    border: 1px solid var(--border);
    border-radius: 90px;
    padding: 4px 8px;
    transition: border-color 0.2s;
}

.chat-footer input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 10px;
    font-size: 0.9rem;
    outline: none;
}

.chat-footer button {
    background: red;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 100px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.chat-footer button:hover { background: var(--primary-hover); }


/* Estilo para a mensagem de login no chat */
.login-prompt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white; /* NOVO: Fundo branco */
    border: 1px solid white; /* NOVO: Borda branca para combinar */
    border-radius: 90px; /* Borda arredondada */
    padding: 10px 15px;
    font-size: 0.9rem;
    color: black; /* NOVO: Texto preto */
    cursor: pointer; /* Indica que é clicável */
    text-align: center;
    transition: background 0.2s, border-color 0.2s, color 0.2s; /* NOVO: Adicionei 'color' na transição */
}

.login-prompt:hover {
    background: #e0e0e0; /* NOVO: Um cinza bem clarinho no hover */
    border-color: #e0e0e0; /* NOVO: Borda clara no hover */
    color: black; /* NOVO: Mantém o texto preto */
}

.login-prompt:active { /* NOVO: Estilo para quando o botão é clicado (ativo) */
    background: red; /* NOVO: Fundo vermelho quando clicado */
    border-color: red; /* NOVO: Borda vermelha */
    color: white; /* NOVO: Texto branco para contrastar com o fundo vermelho */
    transform: scale(0.98); /* NOVO: Uma pequena animação de "apertar" o botão */
}


    /* --- NOVO: Estilos para o Aviso Anti-Flood --- */
    .flood-warning {
        width: 100%; /* Ocupa toda a largura disponível */
        text-align: center; /* Texto centralizado */
        background-color: #ef4444; /* Vermelho vibrante para o aviso */
        color: white; /* Texto branco para contraste */
        padding: 8px 10px; /* Espaçamento interno */
        border-radius: 8px; /* Bordas levemente arredondadas */
        margin-bottom: 10px; /* Espaço abaixo do aviso */
        font-size: 0.9rem; /* Tamanho da fonte */
        font-weight: 600; /* Negrito */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* Sombra para destaque */
        
        position: relative; /* Para z-index e posicionamento no fluxo */
        z-index: 15; /* Garante que fique por cima de outros elementos */
        box-sizing: border-box; /* Garante que o padding não aumente a largura total */
    }



    /* --- NOVO: Estilos para o Botão "Mensagens Recentes" --- */
    .scroll-to-bottom-btn {
        position: absolute;
        bottom: 70px;
        right: 25px;
        
        background-color: #6366f1; /* AGORA É VERMELHO! */
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        z-index: 20;
        
        opacity: 0;
        visibility: hidden;
        transform: translateY(20px);
        transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
        border: none;
    }

    /* Quando o botão está ativo (visível), ele aparece */
    .scroll-to-bottom-btn.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    /* Estilo de hover para o botão (quando o mouse passa por cima) */
    .scroll-to-bottom-btn:hover {
        background-color: ##6366f1; /* Vermelho mais claro para o hover */
    }

    /* Estilo de active para o botão (quando ele é clicado) - opcional, mas legal */
    .scroll-to-bottom-btn:active {
        background-color: ##6366f1; /* Um vermelho um pouco mais escuro para o clique */
        transform: translateY(1px); /* Uma pequena "afundada" no botão */
    }




/* --- MOBILE (TELAS MENORES OU IGUAIS A 900px) --- */
@media (max-width: 900px) {
    .main {
        flex-direction: column; /* Player e chat empilhados verticalmente */
    }

    .player-area {
        width: 100%; /* Player ocupa a largura total */
        /* flex-shrink: 0; já está definido globalmente no .player-area */
    }

    aside.chat {
        width: 100%; /* Chat ocupa a largura total */
        border-left: none; /* Remove a borda lateral */
        /* flex: 1; e min-height: 0; já definidos globalmente no aside.chat */
    }
}

/* Estilo para a bolha da mensagem */
.message-bubble {
  width: 100%;
    max-width: 100%;
    background: #181819; /* Fundo escuro para a bolha */
    border-radius: 15px; /* Bordas arredondadas para o formato de bolha */
    padding: 8px 12px; /* Espaçamento interno */
    /* REMOVIDO: max-width: 85%; */
    word-wrap: break-word; /* Garante que palavras longas quebrem para caber na bolha */
    margin-top: 4px; /* Pequeno espaçamento entre o avatar e a bolha */
    position: relative; /* Para a "setinha" da bolha, se quiser adicionar depois */
}

/* Ajustes no layout da mensagem para acomodar a bolha */
.msg-content {
    display: flex;
    flex-direction: column; /* Coloca os elementos do conteúdo da msg em coluna */
    align-items: flex-start; /* Alinha a bolha à esquerda, para as mensagens dos outros usuários */
    flex: 1; /* Permite que o msg-content ocupe o espaço restante */
}

/* Ajustes para o texto da mensagem dentro da bolha */
.text {
    margin-top: 5px; /* Pequeno espaçamento entre o nome e o texto da mensagem */
    color: white; /* Garante que o texto tenha uma boa cor dentro da bolha escura */
}

/* Ajustes para o nome de usuário dentro da bolha */
.username {
    color: #aaa; /* Cor roxa para o nome de usuário */
    font-weight: 600;
}

/* Ajustes para a hora da mensagem dentro da bolha */
.time {
    color: transparent; /* Cor mais suave para a hora */
}





/* NOVO: Estilo para o contador de caracteres */
.char-count {
    position: absolute;
    right: 55px; /* Ajusta a posição à esquerda do botão de enviar */
    top: 80%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    color: var(--muted);
    background: #09090b; /* Fundo igual ao input-wrapper para "esconder" o texto que ficaria por baixo */
    padding: 0 5px; /* Espaçamento interno */
    border-radius: 5px;
    pointer-events: none; /* Garante que não interfira no clique */
}

/* Opcional: Estilizar o contador quando o limite for atingido */
.char-count.limit-reached {
    color: red;
    font-weight: bold;
}







/* --- DESKTOP (TELAS MAIORES QUE 900px) --- */
@media (min-width: 901px) {
    body {
        padding-top: 20px; /* Adiciona espaçamento na parte superior do body APENAS no desktop */
    }

    .main {
        flex-direction: row; /* Player e chat lado a lado */
        gap: 15px; /* Espaçamento entre player e chat */
        padding-right: 15px; /* Adiciona padding à direita do .main para alinhar com o padding do body */
    }

    .player-area {
        flex: 1; /* Player-area ocupa o espaço flexível */
        min-width: 0; /* Essencial para que o player-area possa encolher */
        height: 100%; /* Player-area ocupa 100% da altura do .main */
    }

    aside.chat {
        width: 430px; /* Largura FIXA para o chat no desktop */
        flex: none; /* Desativa o comportamento flex de largura do chat */
        border: 1px solid var(--border); /* Borda em todos os lados do chat */
        height: 100%; /* CRUCIAL: Chat ocupa 100% da altura do .main */
        border-radius: 10px; /* Bordas arredondadas */
        overflow: hidden; /* Garante que o conteúdo respeite as bordas arredondadas */
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3); /* Sombra para profundidade */
    }
}


/* Estilo para a mensagem de carregamento no chat */
.chat-loading-message {
    text-align: center;
    color: var(--muted); /* Cor de texto mais suave */
    font-size: 0.85rem;
    padding: 20px 0;
    width: 100%; /* Ocupa toda a largura do chat */
    display: none; /* COMEÇA ESCONDIDA AGORA, SÓ APARECE SE PRECISO VIA JS*/
    justify-content: center; /* Para display flex */
    align-items: center; /* Para display flex */
}


        /* Estilos para o Preview de Resposta (embaixo, antes de enviar) */
       .reply-preview {
            display: flex;
            align-items: center;
            background-color: #1e1e1e; /* Fundo escuro para o preview */
            border-left: 4px solid var(--primary); /* Linha colorida à esquerda */
            padding: 3px 12px !important; /* Ajustado para menor altura, com !important para garantir */
            margin: 0 5px 5px 5px; /* Margens para espaçamento */
            border-radius: 8px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            min-height: auto !important; /* Garante que não haja uma altura mínima que impeça o encolhimento */
        }

       .reply-preview-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-right: 10px;
            padding: 0 !important; /* Removendo qualquer padding extra que possa inflar a altura */
            margin: 0 !important; /* Removendo qualquer margin extra */
            min-width: 0; /* Permite que o conteúdo encolha para caber */
            gap: 0px !important;
        }

       .reply-author {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--primary); /* Cor do autor da mensagem original */
            margin-bottom: 0px !important; /* Força a remoção da margem inferior */
            line-height: 1.1em; /* Reduz a altura da linha para maior compactação */
            white-space: nowrap; /* Garante que o nome do autor não quebre linha */
            overflow: hidden;
            text-overflow: ellipsis;
        }

       .reply-text {
            font-size: 0.8em;
            color: #a1a1a1; /* Cor do texto da mensagem original */
            white-space: nowrap !important; /* Evita que o texto quebre linha */
            overflow: hidden !important; /* Esconde o texto que excede */
            text-overflow: ellipsis !important; /* Adiciona "..." se o texto for muito longo */
            margin-top: 0px !important; /* Força a remoção da margem superior */
            line-height: 1.2em; /* Reduz a altura da linha */
        }

       .close-reply-preview {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: all 0.2s ease;
            outline: none !important;
            flex-shrink: 0; /* Garante que o botão X não encolha */
        }

        /* Os estilos do SVG permanecem os mesmos para o X branco */
       .close-reply-preview svg {
            stroke: #FFFFFF;
            width: 18px;
            height: 18px;
        }

       .close-reply-preview:hover svg {
            stroke: var(--primary);
        }

        /* Estilos para a Bolha da Mensagem de Resposta (quando ela aparece NO CHAT) */
       .msg-reply-bubble {
            background: #1f1f21; /* Fundo um pouco mais claro para a citação */
            border-left: 3px solid var(--primary); /* Linha colorida à esquerda */
            padding: 6px 10px;
            margin-bottom: 8px; /* Espaço entre a citação e o texto da resposta */
            border-radius: 6px;
            max-width: 100%; /* GARANTE que a bolha de citação não ultrapasse o contêiner */
            box-sizing: border-box; /* Inclui padding e border na largura total */
            display: block; /* Garante que ocupe a largura disponível e se comporte como bloco */
            
            /* CRÍTICO: Estas propriedades aqui aplicam o truncamento à própria bolha,
               garantindo que ela não cresça mais que o necessário e seu conteúdo também seja limitado */
            white-space: nowrap; /* Tenta manter a bolha em uma única linha se não tiver outros quebra de linha */
            overflow: hidden;    /* Esconde o conteúdo que exceder */
            text-overflow: ellipsis; /* Adiciona '...' */
        }
        
        /* Estilos para o NOME do autor dentro da bolha de resposta NO CHAT */
       .msg-reply-bubble .msg-reply-author {
            color: var(--primary);
            font-weight: bold;
            font-size: 0.8em; /* Tamanho da fonte do nome do autor */
            margin: 0 0 2px 0 !important; /* Margem ajustada e forçada */
            display: block; /* Para que o span ocupe a linha toda */
            white-space: nowrap; /* NÃO QUEBRA O NOME DO AUTOR */
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2em;
        }
        
        /* Estilos para o TEXTO da mensagem citada dentro da bolha de resposta NO CHAT */
       .msg-reply-bubble p {
            margin: 0 !important; /* Remove margem padrão do parágrafo */
            color: var(--muted); /* Cor para o texto da mensagem citada */
            font-size: 0.8em; /* Ajusta o tamanho da fonte do texto citado */
            white-space: nowrap !important; /* **CRUCIAL**: IMPEDE QUE O TEXTO QUEBRE LINHA */
            overflow: hidden !important; /* ESCONDE O QUE EXCEDE */
            text-overflow: ellipsis !important; /* ADICIONA "..." */
            max-width: 100%; /* GARANTE que não vai além do limite do pai */
            line-height: 1.2em; /* Linha mais compacta */
        }
        /* Estilos para o NOME do autor dentro da bolha de resposta NO CHAT */
       .msg-reply-bubble .msg-reply-author {
            color: var(--primary);
            font-weight: bold;
            font-size: 0.8em; /* Tamanho da fonte do nome do autor */
            margin: 0 0 2px 0 !important; /* Margem ajustada e forçada */
            display: block; /* Para que o span ocupe a linha toda */
            white-space: nowrap; /* Não quebra o nome do autor */
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2em;
        }
        /* Estilos para o TEXTO da mensagem citada dentro da bolha de resposta NO CHAT */
       .msg-reply-bubble p {
            margin: 0 !important; /* Remove margem padrão do parágrafo */
            color: var(--muted); /* Cor para o texto da mensagem citada */
            font-size: 0.8em; /* Ajusta o tamanho da fonte do texto citado */
            white-space: nowrap !important; /* **CRUCIAL**: Impede que o texto quebre linha */
            overflow: hidden !important; /* Esconde o que excede */
            text-overflow: ellipsis !important; /* Adiciona "..." */
            max-width: 100%; /* Garante que não vai além do limite do pai */
            line-height: 1.2em; /* Linha mais compacta */
        }



/* --- ESTRUTURA ESPECÍFICA PARA DESKTOP (TELAS MAIORES QUE 900px) --- */
@media (min-width: 901px) {
    body {
        padding-top: 20px; /* Adiciona espaçamento na parte superior do body APENAS no desktop */
    }

    .main {
        flex-direction: row; /* Garante que player e chat fiquem lado a lado */
        gap: 15px; /* Adiciona um espaçamento de 15px entre o player e o chat */
        padding-right: 15px; /* Adiciona padding à direita do .main para alinhar com o padding do body */
    }

    .player-area {
        flex: 1; /* O player vai ocupar TODO o espaço restante da tela */
        min-width: 0; /* Essencial para que o player-area possa encolher se a janela for redimensionada */
    }

    .chat {
        width: 430px; /* <<< Largura FIXA para o chat no desktop */
        flex: none; /* Desativa o comportamento flex do chat para respeitar o 'width' fixo */
        
        border: 1px solid var(--border); /* <<< AGORA SIM: Borda de 1px em TODOS os lados do chat */
        
        height: auto; /* Permite que a altura do chat se ajuste ao conteúdo, ocupando 100% da altura do .main */
        border-radius: 10px; /* Bordas arredondadas para TODOS os cantos */
        overflow: hidden; /* Garante que o conteúdo dentro do chat respeite as bordas arredondadas */
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3); /* Sombra para dar profundidade e separação */
    }
}

        <script>

const firebaseConfig = {

        const iframe = document.getElementById("player");
        const channels = document.querySelectorAll(".channel");
        const chatContainer = document.getElementById("chat");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");
        
           const chatLoading = document.getElementById("chatLoading"); // NOVO: Referência para a mensagem de carregamento
                    // Variáveis para o sistema de resposta
            const replyPreview = document.getElementById("replyPreview");
            const replyAuthor = document.getElementById("replyAuthor");
            const replyText = document.getElementById("replyText");
            const closeReplyPreview = document.getElementById("closeReplyPreview");
            let replyingToMessage = null; // Armazena os dados da mensagem à qual estamos respondendo
            // --- NOVO: Variáveis e Lógica do Botão "Mensagens Recentes" ---
    const scrollToBottomBtn = document.getElementById('scrollToBottomBtn');

    // Função para rolar o chat para o final
    function scrollChatToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Função para verificar a posição do scroll e mostrar/esconder o botão
    function toggleScrollToBottomButton() {
        // chatContainer.scrollTop: Quão longe a barra de rolagem está do topo
        // chatContainer.scrollHeight: Altura total do conteúdo rolável
        // chatContainer.clientHeight: Altura visível do container
        
        // Se a diferença entre a altura total e a altura visível
        // for maior que a posição do scroll (ou seja, não estamos no final),
        // e ainda houver conteúdo para rolar (para evitar em chats curtos)
        const isScrolledUp = chatContainer.scrollHeight - chatContainer.scrollTop > chatContainer.clientHeight + 200; // +50 para uma margem
        const hasOverflow = chatContainer.scrollHeight > chatContainer.clientHeight; // Verifica se há rolagem
        
        if (isScrolledUp && hasOverflow) {
            scrollToBottomBtn.classList.add('active'); // Mostra o botão
        } else {
            scrollToBottomBtn.classList.remove('active'); // Esconde o botão
        }
    }

    // --- FIM: Variáveis e Lógica do Botão "Mensagens Recentes" ---
        
        
                // NOVOS ELEMENTOS: Referências para controlar a área de input/mensagem de login
        const chatInputArea = document.getElementById("chatInputArea");
        const loginPrompt = document.getElementById("loginPrompt");
        

        const playerOverlay = document.getElementById("playerOverlay");
        const overlayMessage = document.getElementById("overlayMessage");

        // Variável para armazenar o ID do setTimeout para o overlay, para poder cancelar se necessário
        let overlayHideTimeout;
        
            // --- NOVO: Variáveis e Lógica Anti-Flood ---
    const FLOOD_MESSAGE_LIMIT = 3; // Quantidade de mensagens para ativar o bloqueio
    const FLOOD_TIME_WINDOW = 8000; // 8 segundos em milissegundos
    const FLOOD_BLOCK_DURATION = 120; // 120 segundos (2 minutos) de bloqueio

    let messagesSentTimestamps = []; // Armazena os timestamps das últimas mensagens enviadas
    let isFlooded = false; // Flag para indicar se o usuário está bloqueado
    let floodCountdownInterval = null; // ID do intervalo para o contador regressivo

    const floodWarningElement = document.getElementById('floodWarning');
    const floodCountdownElement = document.getElementById('floodCountdown');

    // Função para verificar se o usuário está floodando
    function checkFlood() {
        const now = Date.now();
        // Remove timestamps antigos (fora da janela de 8 segundos)
        messagesSentTimestamps = messagesSentTimestamps.filter(timestamp => now - timestamp < FLOOD_TIME_WINDOW);

        if (messagesSentTimestamps.length >= FLOOD_MESSAGE_LIMIT) {
            startFloodProtection();
            return true; // Usuário foi detectado como floodando
        }
        return false; // Não está floodando
    }

    // Função para iniciar o bloqueio anti-flood
    function startFloodProtection() {
        if (isFlooded) return; // Já está bloqueado, não faz nada

        isFlooded = true;
        sendBtn.disabled = true; // Desabilita o botão de enviar
        msgInput.disabled = true; // Desabilita o campo de input
        floodWarningElement.style.display = 'block'; // Mostra o aviso de flood
        chatInputArea.classList.add('flood-active'); // Adiciona classe para ajustar layout

        let countdown = FLOOD_BLOCK_DURATION;
        floodCountdownElement.textContent = countdown; // Exibe o tempo inicial

        // Limpa intervalos anteriores para evitar duplicidade
        if (floodCountdownInterval) clearInterval(floodCountdownInterval);

        // Inicia o contador regressivo
        floodCountdownInterval = setInterval(() => {
            countdown--;
            floodCountdownElement.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(floodCountdownInterval);
                endFloodProtection(); // Libera o usuário quando o tempo acabar
            }
        }, 1000); // Atualiza a cada segundo
    }

    // Função para encerrar o bloqueio anti-flood
    function endFloodProtection() {
        isFlooded = false;
        clearInterval(floodCountdownInterval); // Para o contador
        
        floodWarningElement.style.display = 'none'; // Esconde o aviso
        chatInputArea.classList.remove('flood-active'); // Remove classe de ajuste de layout

        // Reabilita o input e o botão, usando a lógica existente do botão inteligente
        msgInput.disabled = false;
        updateSendButtonState(); // Chama a função para reativar/desativar o botão com base no texto atual
    }
    // --- FIM: Variáveis e Lógica Anti-Flood ---

        // NOVO: Referência para o contador de caracteres
        const charCount = document.getElementById("charCount");
        const MESSAGE_MAX_LENGTH = 120; // NOVO: Define o limite máximo da mensagem

        // --- Lógica Inicial do Player ---
        // 1. Garante que o iframe começa vazio
        iframe.src = "";
        // 2. Exibe a mensagem inicial com fade-in
        playerOverlay.style.display = 'flex'; // Torna o elemento visível para iniciar o fade-in
        setTimeout(() => { // Pequeno delay para garantir que o 'display' foi aplicado antes do 'opacity'
            playerOverlay.classList.add('visible');
            overlayMessage.innerText = "Escolha uma câmera";
        }, 10); // Pequeno delay
        // --- Fim Lógica Inicial ---

     // Trocar Canais
    channels.forEach(c => {
        c.addEventListener("click", () => {
            // Limpa qualquer timeout anterior para evitar comportamento inesperado se o usuário clicar rápido
            clearTimeout(overlayHideTimeout);

            channels.forEach(el => el.classList.remove("active"));
            c.classList.add("active");

            // --- Lógica para mostrar overlay com fade-in ---
            playerOverlay.style.display = 'flex'; // Garante que o overlay é um flexbox
            setTimeout(() => { // Pequeno delay para garantir que o 'display' foi aplicado antes do 'opacity'
                playerOverlay.classList.remove('hidden'); // Remove a classe hidden se estiver lá
                playerOverlay.classList.add('visible'); // Adiciona a classe visible para o fade-in
                overlayMessage.innerText = "Carregando câmera...";
            }, 10); // Pequeno delay
            // --- Fim Lógica mostrar overlay ---

            // **** INÍCIO DA MODIFICAÇÃO PARA O AUTOPLAY ****
            let baseUrl = c.dataset.url;
            let finalUrl = baseUrl;

            // Verifica se a URL já tem algum parâmetro (se tem '?')
            let hasQueryParams = baseUrl.includes('?');

            // Adiciona os parâmetros de autoplay e mute.
            // mute=1 é essencial, pois a maioria dos navegadores bloqueia autoplay com som.
            finalUrl += (hasQueryParams ? '&' : '?') + 'autoplay=1&mute=1';

            // Define a URL MODIFICADA no iframe
            iframe.src = finalUrl;
            // **** FIM DA MODIFICAÇÃO PARA O AUTOPLAY ****

            // Esconder overlay após 2.4 segundos (2400ms) - Ajustado conforme a discussão anterior
            overlayHideTimeout = setTimeout(() => { // Armazena o ID do timeout
                playerOverlay.classList.remove('visible'); // Inicia o fade-out
                playerOverlay.classList.add('hidden'); // Adiciona a classe hidden
                
                // NOVO: Adiciona um setTimeout EXTRA para mudar o display para 'none' APÓS o fade-out
                setTimeout(() => {
                    playerOverlay.style.display = 'none'; // Agora sim, remove do layout
                }, 400); // Deve ser igual à duração da transição de opacidade do CSS (0.4s = 400ms)

            }, 2400); // O tempo que o overlay fica visível (2.4 segundos)
        });
    });

// ENVIAR MENSAGEM PARA O FIREBASE
function sendMessage() {
  if (isFlooded) {
        return;
    }
    
    const text = msgInput.value.trim();

    // NOVO: Verifica se a mensagem excede o limite antes de enviar
    if (text.length > MESSAGE_MAX_LENGTH) {
        alert(`Sua mensagem excede o limite de ${MESSAGE_MAX_LENGTH} caracteres.`);
        return; // Impede o envio da mensagem
    }

    if (text === "") return;

    const user = auth.currentUser;

    if (!user) {
        alert("Você precisa estar logado para enviar mensagens.");
        return;
    }

    const userName = localStorage.getItem('userName') || user.displayName || "Anônimo";
    const userPhoto = localStorage.getItem('userPhotoURL') || user.photoURL || null;

    const messageData = {
        name: userName,
        photo: userPhoto,
        text: text,
        timestamp: Date.now()
    };
    
    
            
            

        // SE ESTAMOS RESPONDENDO A UMA MENSAGEM, ADICIONA AS INFORMAÇÕES DELA
        if (replyingToMessage) {
            messageData.replyTo = {
                id: replyingToMessage.id,
                author: replyingToMessage.author,
                text: replyingToMessage.text
            };
        }
    
    // NOVO: Registra o timestamp da mensagem enviada
    messagesSentTimestamps.push(Date.now());
    // NOVO: Verifica se o usuário ativou o modo flood com esta mensagem
    if (checkFlood()) {
        return; // Se ativou o flood, esta mensagem não é enviada (ou a última que causou o flood)
    }

    database.ref("chatMessages").push(messageData);

    msgInput.value = "";
     clearReplyMode(); // Desativa o modo de resposta após enviar
    // NOVO: Reseta o contador após enviar a mensagem
    charCount.textContent = `0/${MESSAGE_MAX_LENGTH}`;
    charCount.classList.remove("limit-reached");
    
    scrollChatToBottom(); 
    //
}


// Adicione este bloco DEPOIS de onde 'msgInput' é definido e ANTES de 'sendBtn.addEventListener'
msgInput.addEventListener("input", () => {
    const currentLength = msgInput.value.length;
    charCount.textContent = `${currentLength}/${MESSAGE_MAX_LENGTH}`;

    if (currentLength >= MESSAGE_MAX_LENGTH) {
        charCount.classList.add("limit-reached");
        // Opcional: desabilitar o botão de enviar se quiser, mas o maxlength já impede a digitação
        // sendBtn.disabled = true; 
    } else {
        charCount.classList.remove("limit-reached");
        // Opcional: habilitar o botão de enviar
        // sendBtn.disabled = false;
    }
});


// Botões
sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keypress", (e) => {
        // NOVO: Adiciona a verificação de 'isFlooded' aqui também
        if (e.key === "Enter" && !sendBtn.disabled && !isFlooded) {
            sendMessage();
            setTimeout(() => {
                msgInput.value = "";
                updateSendButtonState();
            }, 0);
        }
    });




    // --- NOVO: Listener para o botão de rolar para o final ---
    scrollToBottomBtn.addEventListener('click', scrollChatToBottom);

    // --- NOVO: Listener para o scroll do chat ---
    // Verifica a posição do scroll a cada vez que o usuário rola
    chatContainer.addEventListener('scroll', toggleScrollToBottomButton);

    // OUVIR NOVAS MENSAGENS EM TEMPO REAL
    database.ref("chatMessages").limitToLast(100).on("child_added", (snapshot) => {
        if (chatLoading.style.display !== 'none') {
            chatLoading.style.display = 'none';
        }
        const data = snapshot.val();

        const time = new Date(data.timestamp).toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
        });

        const avatarLetter = data.name.charAt(0).toUpperCase();

            const msgHtml = `
            <div class="msg" data-message-id="${snapshot.key}">
                <div class="avatar">
                    ${data.photo? `<img src="${data.photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : avatarLetter}
                </div>
                <div class="msg-content">
                    <div class="message-bubble"> <!-- AQUI É A BOLHA PRINCIPAL DA SUA MENSAGEM -->
                        <div class="msg-info">
                            <span class="username">${data.name}</span>
                            <span class="time">${time}</span>
                        </div>
                        
                                                ${data.replyTo ? ` <!-- SE ESTA MENSAGEM É UMA RESPOSTA... -->
                            <div class="msg-reply-bubble">
                                <span class="msg-reply-author">${data.replyTo.author || 'Mensagem Citada'}</span>
                                <p>${data.replyTo.text.length > 30 ? data.replyTo.text.substring(0, 30) + '...' : data.replyTo.text}</p>
                            </div>
                        ` : ''}
                        <div class="text">${data.text}</div>
                    </div>
                </div>
            </div>
        `;

        // Verifica se o usuário já está no final do chat antes de adicionar a mensagem
        // e rolar automaticamente. Se estiver lendo mensagens antigas, não rola.
        const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop <= chatContainer.clientHeight + 1; // +1 para margem de erro
        
        chatContainer.insertAdjacentHTML('beforeend', msgHtml);
        
                    // Lógica para arrastar (swipe) a mensagem
            const newMessageElement = chatContainer.lastElementChild; // Pega a mensagem recém-adicionada
            let touchStartX = 0;
            let touchCurrentX = 0;
            let currentMessageTouched = null;

            newMessageElement.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                currentMessageTouched = e.currentTarget;
                currentMessageTouched.style.transition = 'none'; // Desabilita transição para swipe imediato
            });

            newMessageElement.addEventListener('touchmove', (e) => {
                if (currentMessageTouched) {
                    touchCurrentX = e.touches[0].clientX;
                    const diffX = touchCurrentX - touchStartX;
                    
                    // Se estiver arrastando para a direita e a distância for razoável
                    if (diffX > 50 && diffX < 200) { // Limite de 50px a 200px para o swipe
                        currentMessageTouched.style.transform = `translateX(${diffX}px)`;
                    } else if (diffX >= 200) { // Limita o swipe a 200px
                        currentMessageTouched.style.transform = `translateX(200px)`;
                    } else { // Se arrastar para a esquerda ou pouco para direita, reseta
                        currentMessageTouched.style.transform = `translateX(0px)`;
                    }
                }
            });

            newMessageElement.addEventListener('touchend', (e) => {
                if (currentMessageTouched) {
                    const diffX = touchCurrentX - touchStartX;
                    currentMessageTouched.style.transition = 'transform 0.3s ease-out'; // Restaura transição
                    currentMessageTouched.style.transform = `translateX(0px)`; // Retorna à posição original

                    if (diffX > 100) { // Se arrastou mais de 100px para a direita
                        // Ativa o modo de resposta!
                        const messageId = currentMessageTouched.dataset.messageId;
                        const author = currentMessageTouched.querySelector('.username').textContent;
                        let text = currentMessageTouched.querySelector('.text').textContent;
                        
                        // Trunca o texto da mensagem original para o preview
                        if (text.length > 50) {
                            text = text.substring(0, 50) + '...';
                        }
                        
                        setReplyMode({ id: messageId, author: author, text: text });
                    }
                    currentMessageTouched = null;
                }
            });
        
        if (isAtBottom) {
            scrollChatToBottom(); // Rola para o final apenas se já estava no final
        }

        // NOVO: Chama a verificação do botão, caso a adição de mensagens tenha alterado a necessidade de rolagem
        toggleScrollToBottomButton();
    });

    // --- NOVO: Chamada inicial para definir o estado do botão ao carregar a página ---
    // Útil se já houver mensagens no chat
    setTimeout(toggleScrollToBottomButton, 500); // Pequeno atraso para garantir que o conteúdo do chat seja renderizado


// --- NOVO CÓDIGO PARA LÓGICA DE LOGIN NO CHAT (APARECER/DESAPARECER O BOTÃO) ---

// Função para alternar a visibilidade do input de chat ou da mensagem de login
function updateChatInputState(user) {
    if (user) {
        // Usuário logado: mostra o input de chat normal e esconde a mensagem de login.
        chatInputArea.style.display = 'flex'; // Exibe o campo de input
        loginPrompt.style.display = 'none';   // Esconde a mensagem "Faça login"
    } else {
        // Usuário NÃO logado: esconde o input de chat e mostra a mensagem "Faça login".
        chatInputArea.style.display = 'none'; // Esconde o campo de input
        loginPrompt.style.display = 'flex';   // Exibe a mensagem "Faça login"
    }
}

// Redireciona para a página de login ao clicar na mensagem
loginPrompt.addEventListener("click", () => {
    window.location.href = "login.html"; // Redireciona para a sua página de login
});

// Listener de estado de autenticação do Firebase
// Esta função é CRÍTICA. Ela será chamada toda vez que o estado de login mudar
// (logar, deslogar) e também quando a página carregar (para verificar se já está logado).
// Aguarda Firebase confirmar estado real antes de exibir qualquer coisa
auth.onAuthStateChanged((user) => {
  // NOVO: Exibe a mensagem de carregamento no início
chatLoading.style.display = 'flex'; // Torna a mensagem de carregamento visível

    if (user) {
        // Está realmente logado
        chatInputArea.style.display = "flex";
        loginPrompt.style.display = "none";
    } else {
        // Não está logado
        chatInputArea.style.display = "none";
        loginPrompt.style.display = "flex";
    }

});


        // Função para ativar o modo de resposta
        function setReplyMode(message) {
            replyingToMessage = message;
            replyAuthor.textContent = message.author;
            replyText.textContent = message.text;
            replyPreview.style.display = 'flex'; // Exibe o preview
            msgInput.focus(); // Coloca o foco no campo de input
        }

        // Função para desativar o modo de resposta
        function clearReplyMode() {
            replyingToMessage = null;
            replyPreview.style.display = 'none'; // Esconde o preview
        }

        // Event listener para o botão "X" no preview de resposta
        closeReplyPreview.addEventListener('click', clearReplyMode);





// --- FIM DO CÓDIGO DO BOTÃO ---

        </script>
